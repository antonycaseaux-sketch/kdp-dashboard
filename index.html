<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Résultats KDP</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--text:#152033;--muted:#6b7280;--line:#d9dee7;--primary:#0f766e;--primary-soft:#dff7f3;--danger:#b91c1c;--warning:#b45309;--success:#15803d;--shadow:0 10px 30px rgba(18,38,63,.08);--radius:18px}
*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#f7fafc 0%,var(--bg) 100%);color:var(--text)}
.wrap{max-width:1200px;margin:0 auto;padding:18px 14px 28px}.card{background:var(--card);border:1px solid rgba(15,23,42,.06);border-radius:var(--radius);box-shadow:var(--shadow)}
.hero{display:grid;grid-template-columns:1.3fr .7fr;gap:10px;margin-bottom:10px}.hero-main{padding:12px;position:relative;cursor:pointer}.hero-side{padding:10px;display:flex;flex-direction:column;justify-content:center;gap:6px;background:linear-gradient(135deg,#0f766e 0%,#115e59 100%);color:#fff}.eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;font-weight:700}h1{margin:0;font-size:clamp(24px,3.2vw,34px);line-height:1}#monthTitle{color:var(--primary);font-weight:800}.picker{position:absolute;top:calc(100% + 8px);left:12px;display:none;min-width:220px;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:8px;z-index:20}.picker.open{display:grid;gap:8px}.option{border:0;border-radius:12px;padding:10px 12px;text-align:left;background:#f8fafc;color:var(--text);font:inherit;font-weight:700;cursor:pointer}.option:hover{background:#eef2f7}.option.active{background:#dff7f3;color:var(--primary)}
.hero-side .small{margin:0;font-size:13px;opacity:.9;font-weight:700}.hero-side .big{font-size:30px;font-weight:800;line-height:.95}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:10px}.stat{padding:14px;border-radius:var(--radius);display:flex;flex-direction:column;justify-content:center;min-width:0}.royalties{background:#f3f4f6}.ads{background:#fee2e2}.freelance{background:#ffedd5}.margin{background:#dcfce7}.stat-label{font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:700}.stat-value{font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1.1}.red{color:var(--danger)}.orange{color:var(--warning)}.green{color:var(--success)}
.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:10px}.section{padding:16px}.section h2{margin:0 0 10px;font-size:18px;background:#000;color:#fff;padding:8px 10px;border-radius:10px}.top-list{display:grid;gap:10px}.book-row{display:grid;grid-template-columns:46px 1fr auto;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:14px;background:#fbfcfe}.gold{background:#fde68a}.silver{background:#e5e7eb}.bronze{background:#e7a977}.rank{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;background:var(--primary-soft);color:var(--primary);font-weight:800;font-size:14px}.rank.gold{background:#f59e0b;color:#fff}.rank.silver{background:#9ca3af;color:#fff}.rank.bronze{background:#b45309;color:#fff}.book-name{font-weight:700;line-height:1.25}.book-sub{margin-top:3px;color:var(--muted);font-size:12px}.book-amount{font-weight:800;white-space:nowrap;font-size:14px}
.months-table{width:100%;border-collapse:collapse;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fbfcfe}.months-table th,.months-table td{padding:10px 12px;border-bottom:1px solid var(--line);font-size:14px}.months-table tr:last-child td{border-bottom:0}.months-table th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:#f8fafc}.months-table td:last-child,.months-table th:last-child{text-align:right}.months-table td:nth-child(5){font-weight:700;background:#dcfce7}.month-current td{font-weight:700}.year-total-row td{background:#f3f4f6;font-weight:800;border-top:2px solid var(--line)}
@media (max-width:980px){.hero{grid-template-columns:1fr 1fr}.stats{grid-template-columns:repeat(4,minmax(0,1fr))}.grid{grid-template-columns:1.05fr .95fr}}
@media (max-width:640px){.table-section{order:-1}.top-section{order:0}.wrap{padding:10px 8px 20px}.card{border-radius:12px}.hero{grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}.hero-main,.hero-side,.section,.stat{padding:10px}.eyebrow{font-size:8px}h1{font-size:18px}.hero-side{gap:4px;align-items:flex-start}.hero-side .small{font-size:10px}.hero-side .big{font-size:20px}.picker{left:0;right:0;min-width:0}.stats{grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin-bottom:6px}.stat-label{font-size:9px;margin-bottom:2px}.stat-value{font-size:16px;line-height:1}.grid{grid-template-columns:1fr;gap:6px}.section h2{font-size:13px;margin-bottom:8px}.top-list{gap:6px}.book-row{grid-template-columns:32px 1fr auto;gap:6px;padding:8px}.rank{width:28px;height:28px;font-size:10px;border-radius:8px}.book-name,.book-amount,.months-table td{font-size:10px}.book-sub,.months-table th{font-size:8px}.months-table{table-layout:fixed}.months-table th,.months-table td{padding:5px 4px;word-break:break-word}}
</style>

<body>
<div class="wrap">

    <div class="card stat ads"><div class="stat-label">Dépenses pub</div><div class="stat-value red" id="adsValue"></div></div>
    <div class="card stat freelance"><div class="stat-label">Dépenses Free</div><div class="stat-value orange" id="freelanceValue"></div></div>
    <div class="card stat margin"><div class="stat-label">Marge nette</div><div class="stat-value green" id="marginValue"></div></div>

  <section class="grid">

    </div>

      </table>
    </div>
  </section>

let currentYear='2026',currentIndex=4;
const $=id=>document.getElementById(id);
const months=yr=>Y[yr].m;
function current(){return months(currentYear)[currentIndex]}
function clampIndex(){const m=months(currentYear);if(currentIndex>=m.length)currentIndex=0;return m}
function renderPickers(){const mp=$('monthPicker'),yp=$('yearPicker'),m=clampIndex();mp.innerHTML=m.map((x,i)=>`<button class="option ${i===currentIndex?'active':''}" data-i="${i}">${x[0]}</button>`).join('');yp.innerHTML=YEARS.map(y=>`<button class="option ${y===currentYear?'active':''}" data-y="${y}">${y}</button>`).join('');mp.querySelectorAll('[data-i]').forEach(b=>b.onclick=e=>{e.stopPropagation();currentIndex=+b.dataset.i;render();mp.classList.remove('open')});yp.querySelectorAll('[data-y]').forEach(b=>b.onclick=e=>{e.stopPropagation();currentYear=b.dataset.y;currentIndex=0;render();yp.classList.remove('open')})}
